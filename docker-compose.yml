services:

  postgres:
    image: postgres:16

    container_name: steam_postgres

    restart: unless-stopped

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "${POSTGRES_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - steam_network

  pgadmin:
    image: dpage/pgadmin4

    container_name: steam_pgadmin

    restart: unless-stopped

    env_file:
      - .env

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}

    ports:
      - "5050:80"

    depends_on:
      - postgres

    networks:
      - steam_network

  airflow-init:
    image: apache/airflow:2.10.0

    container_name: airflow_init

    depends_on:
      - postgres

    env_file:
      - .env.airflow

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://steam_admin:SteamDW_2026!Data@postgres:5432/airflow_db

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: steam_dw
      POSTGRES_USER: steam_admin
      POSTGRES_PASSWORD: SteamDW_2026!Data

    command: >
      bash -c "
      airflow db migrate &&
      airflow users create
      --username admin
      --password admin
      --firstname Airflow
      --lastname Admin
      --role Admin
      --email admin@airflow.com
      "

    networks:
      - steam_network

  airflow-webserver:
    image: apache/airflow:2.10.0

    container_name: airflow_webserver

    restart: unless-stopped

    depends_on:
      - airflow-init

    env_file:
      - .env.airflow

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://steam_admin:SteamDW_2026!Data@postgres:5432/airflow_db

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./:/opt/project

    ports:
      - "8080:8080"

    command: webserver

    networks:
      - steam_network

  airflow-scheduler:
    image: apache/airflow:2.10.0

    container_name: airflow_scheduler

    restart: unless-stopped

    depends_on:
      - airflow-webserver

    env_file:
      - .env.airflow

    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://steam_admin:SteamDW_2026!Data@postgres:5432/airflow_db

      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: steam_dw
      POSTGRES_USER: steam_admin
      POSTGRES_PASSWORD: SteamDW_2026!Data

    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./:/opt/project

    command: scheduler

    networks:
      - steam_network

volumes:
  postgres_data:

networks:
  steam_network: